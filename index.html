<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EdgeFlow Pro — EV Scanner</title>
<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;
  --blue:#38bdf8;
  --shadow:0 25px 60px rgba(0,0,0,0.55);
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 30%), #020617;
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:24px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}

.title{
  font-size:32px;
  font-weight:900;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  color:var(--muted);
  font-size:14px;
}

.status{
  font-size:12px;
  color:var(--muted);
}

.controls{
  margin:20px 0;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

.scan-btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
  font-weight:800;
  cursor:pointer;
  color:#02111f;
}

.scan-btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.pill{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
}

.metric{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}

.box{
  background:var(--card);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
}

.box b{
  font-size:20px;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th, .table td{
  padding:14px;
  border-bottom:1px solid var(--border);
}

.table th{
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-weight:800;
}

.Aplus{ background:rgba(34,197,94,0.2); color:#22c55e; }
.A{ background:rgba(56,189,248,0.2); color:#38bdf8; }
.B{ background:rgba(234,179,8,0.2); color:#eab308; }

.top-row{
  background:rgba(34,197,94,0.08);
}

@media(max-width:900px){
  .metric{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
  .metric{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">EdgeFlow Pro</div>
      <div class="sub">Filtered EV Scanner — Lines & Totals Only</div>
    </div>
    <div class="status" id="status">Idle — waiting for scan</div>
  </div>
  <div class="controls">
    <button class="scan-btn" id="scanBtn" onclick="render()">🔍 Scan Now</button>
    <div class="pill">Mode: High EV Only</div>
    <div class="pill">Markets: Spreads + Totals</div>
    <div class="pill">Cooldown: 30s</div>
  </div>
  <div class="metric">
    <div class="box">Top Edge<br><b id="topEdge">-</b></div>
    <div class="box">Opportunities<br><b id="opps">-</b></div>
    <div class="box">Avg EV<br><b id="avgEV">-</b></div>
    <div class="box">Cache<br><b id="cache">Empty</b></div>
  </div>
  <table class="table">
    <thead>
      <tr>
        <th>Game</th>
        <th>Market</th>
        <th>Odds</th>
        <th>Fair</th>
        <th>EV%</th>
        <th>Grade</th>
      </tr>
    </thead>
    <tbody id="body">
      <tr><td colspan="6">Press Scan to begin</td></tr>
    </tbody>
  </table>
</div>
<script>
const API_KEY = "PASTE_YOUR_API_KEY";
const SPORT = "soccer_epl";
const COOLDOWN = 30000;

let cache = null;
let last = 0;
let scanning = false;

function grade(ev){
  if(ev >= 6) return {label:"A+", class:"Aplus"};
  if(ev >= 4) return {label:"A", class:"A"};
  if(ev >= 2.5) return {label:"B", class:"B"};
  return null;
}

function process(data){
  const results = [];

  data.forEach(game=>{
    const name = `${game.home_team} vs ${game.away_team}`;

    game.bookmakers?.forEach(book=>{
      book.markets?.forEach(m=>{

        if(!["spreads","totals"].includes(m.key)) return;

        m.outcomes?.forEach(o=>{
          const odds = Number(o.price);
          if(!odds || odds <= 1.5) return;

          const fair = odds * 0.985;
          const ev = ((odds / fair) - 1) * 100;

          const g = grade(ev);
          if(!g) return;

          results.push({
            name,
            market: `${m.key} ${o.name} (${book.title})`,
            odds,
            fair,
            ev,
            grade: g
          });
        });
      });
    });
  });

  return results.sort((a,b)=>b.ev-a.ev).slice(0,20);
}

async function fetchOdds(){
  if(cache && Date.now() - last < COOLDOWN){
    document.getElementById("status").textContent = "Using cached data";
    return cache;
  }

  const res = await fetch(`https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?markets=spreads,totals&oddsFormat=decimal&apiKey=${API_KEY}`);

  if(!res.ok) throw new Error("API error");

  const data = await res.json();

  cache = data;
  last = Date.now();

  return data;
}

async function render(){
  if(scanning) return;

  scanning = true;
  const btn = document.getElementById("scanBtn");
  btn.disabled = true;
  btn.textContent = "Scanning...";
  document.getElementById("status").textContent = "Scanning markets...";

  try{
    const raw = await fetchOdds();
    const data = process(raw);

    if(!data.length){
      document.getElementById("body").innerHTML = "<tr><td colspan='6'>No edges found</td></tr>";
      return;
    }

    let total=0;
    let top=data[0].ev;

    document.getElementById("body").innerHTML = data.map((d,i)=>{
      total += d.ev;
      return `
      <tr class="${i===0 ? "top-row":""}">
        <td>${d.name}</td>
        <td>${d.market}</td>
        <td>${d.odds.toFixed(2)}</td>
        <td>${d.fair.toFixed(2)}</td>
        <td>${d.ev.toFixed(2)}%</td>
        <td><span class="badge ${d.grade.class}">${d.grade.label}</span></td>
      </tr>`;
    }).join("");

    document.getElementById("topEdge").textContent = top.toFixed(2)+"%";
    document.getElementById("opps").textContent = data.length;
    document.getElementById("avgEV").textContent = (total/data.length).toFixed(2)+"%";
    document.getElementById("cache").textContent = "Updated";

    document.getElementById("status").textContent = "Scan complete";
  }
  catch(e){
    document.getElementById("status").textContent = "Error: check API key";
  }
  finally{
    scanning = false;
    btn.disabled = false;
    btn.textContent = "🔍 Scan Now";
  }
}
</script>
</body>
</html>
:::
