<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EdgeFlow Pro — EV Command Centre</title>

<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;
  --blue:#38bdf8;
  --shadow:0 25px 60px rgba(0,0,0,0.55);
}

*{box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI;}

body{
  margin:0;
  background:radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 30%), #020617;
  color:var(--text);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:24px;
}

.title{
  font-size:34px;
  font-weight:900;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.controls{
  margin:20px 0;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

select, input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:white;
}

.scan-btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
  font-weight:800;
  cursor:pointer;
}

.metric{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:20px;
}

.box{
  background:var(--card);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th, .table td{
  padding:12px;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

.table tr:hover{
  background:rgba(56,189,248,0.06);
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-weight:800;
}

.Aplus{ background:rgba(34,197,94,0.2); color:#22c55e; }
.A{ background:rgba(56,189,248,0.2); color:#38bdf8; }
.B{ background:rgba(234,179,8,0.2); color:#eab308; }

.edge-bar{
  height:6px;
  background:#1e293b;
  border-radius:4px;
  overflow:hidden;
}

.edge-fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
}

.top{
  border-left:4px solid #22c55e;
}
</style>
</head>

<body>
<div class="container">

<div class="title">EdgeFlow Command Centre</div>

<div class="controls">

<select id="sport">
<option value="basketball_nba">NBA</option>
<option value="australian_rules_afl">AFL</option>
<option value="soccer_epl">EPL</option>
</select>

<input id="bankroll" type="number" placeholder="Bankroll ($)" value="5000">

<select id="kellyFrac">
<option value="1">Full Kelly</option>
<option value="0.5" selected>Half Kelly</option>
<option value="0.25">Quarter Kelly</option>
</select>

<button class="scan-btn" onclick="render()">🔍 Scan Markets</button>

</div>

<div class="metric">
<div class="box">Top Edge<br><b id="topEdge">-</b></div>
<div class="box">Opportunities<br><b id="opps">-</b></div>
<div class="box">Avg EV<br><b id="avgEV">-</b></div>
<div class="box">Best Bet<br><b id="bestBet">-</b></div>
<div class="box">Stake ($)<br><b id="stake">-</b></div>
</div>

<table class="table">
<thead>
<tr>
<th>Game</th>
<th>Market</th>
<th>Odds</th>
<th>True %</th>
<th>EV%</th>
<th>Edge</th>
<th>Stake</th>
<th>Grade</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
const API_KEY = "PASTE_YOUR_API_KEY";

function grade(ev){
  if(ev >= 7) return {label:"A+", class:"Aplus"};
  if(ev >= 4) return {label:"A", class:"A"};
  if(ev >= 2) return {label:"B", class:"B"};
  return null;
}

function fairProb(outcomes){
  const probs = outcomes.map(o => 1/o.price);
  const total = probs.reduce((a,b)=>a+b,0);
  return probs.map(p => p/total);
}

function kelly(odds, prob){
  const b = odds - 1;
  return ((b * prob) - (1 - prob)) / b;
}

function process(data){
  let results = [];

  data.forEach(game=>{
    const name = `${game.home_team} vs ${game.away_team}`;

    game.bookmakers?.forEach(book=>{
      book.markets?.forEach(m=>{
        if(!["spreads","totals"].includes(m.key)) return;

        const fair = fairProb(m.outcomes);

        m.outcomes.forEach((o,i)=>{
          const odds = o.price;
          const trueProb = fair[i];
          const ev = ((odds * trueProb) - 1) * 100;

          const g = grade(ev);
          if(!g) return;

          const k = Math.max(0, kelly(odds, trueProb));

          results.push({
            name,
            market:`${m.key} ${o.name}`,
            odds,
            trueProb,
            ev,
            kelly:k,
            grade:g
          });
        });
      });
    });
  });

  return results.sort((a,b)=>b.ev-a.ev).slice(0,20);
}

async function render(){

  const sport = document.getElementById("sport").value;
  const bankroll = parseFloat(document.getElementById("bankroll").value || 0);
  const kFrac = parseFloat(document.getElementById("kellyFrac").value);

  document.getElementById("body").innerHTML = "Scanning...";

  const res = await fetch(`https://api.the-odds-api.com/v4/sports/${sport}/odds/?markets=spreads,totals&oddsFormat=decimal&apiKey=${API_KEY}`);
  const raw = await res.json();

  const data = process(raw);

  if(!data.length){
    document.getElementById("body").innerHTML = "<tr><td colspan='8'>No edges</td></tr>";
    return;
  }

  let total=0;

  document.getElementById("body").innerHTML = data.map((d,i)=>{
    total += d.ev;

    const stake = bankroll * d.kelly * kFrac;

    return `
    <tr class="${i===0?'top':''}">
      <td>${d.name}</td>
      <td>${d.market}</td>
      <td>${d.odds.toFixed(2)}</td>
      <td>${(d.trueProb*100).toFixed(1)}%</td>
      <td>${d.ev.toFixed(2)}%</td>
      <td>
        <div class="edge-bar">
          <div class="edge-fill" style="width:${Math.min(d.ev*5,100)}%"></div>
        </div>
      </td>
      <td>$${stake.toFixed(0)}</td>
      <td><span class="badge ${d.grade.class}">${d.grade.label}</span></td>
    </tr>
    `;
  }).join("");

  const best = data[0];
  const bestStake = bankroll * best.kelly * kFrac;

  document.getElementById("topEdge").textContent = best.ev.toFixed(2)+"%";
  document.getElementById("opps").textContent = data.length;
  document.getElementById("avgEV").textContent = (total/data.length).toFixed(2)+"%";
  document.getElementById("bestBet").textContent = best.market;
  document.getElementById("stake").textContent = "$"+bestStake.toFixed(0);
}
</script>

</body>
</html>
