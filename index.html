<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EdgeFlow Pro — EV Command Centre</title>

<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;
  --blue:#38bdf8;
  --shadow:0 25px 60px rgba(0,0,0,0.55);
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 30%), #020617;
  color:var(--text);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:24px;
}

.title{
  font-size:34px;
  font-weight:900;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.controls{
  margin:20px 0;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.scan-btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
  font-weight:800;
  cursor:pointer;
}

.metric{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:20px;
}

.box{
  background:var(--card);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th, .table td{
  padding:14px;
  border-bottom:1px solid var(--border);
}

.table tr:hover{
  background:rgba(56,189,248,0.06);
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-weight:800;
}

.Aplus{ background:rgba(34,197,94,0.2); color:#22c55e; }
.A{ background:rgba(56,189,248,0.2); color:#38bdf8; }
.B{ background:rgba(234,179,8,0.2); color:#eab308; }

.top{
  border-left:4px solid #22c55e;
}
</style>
</head>

<body>
<div class="container">

<div class="title">EdgeFlow Command Centre</div>

<div class="controls">
<button class="scan-btn" onclick="render()">🔍 Scan Markets</button>
</div>

<div class="metric">
<div class="box">Top Edge<br><b id="topEdge">-</b></div>
<div class="box">Opportunities<br><b id="opps">-</b></div>
<div class="box">Avg EV<br><b id="avgEV">-</b></div>
<div class="box">Best Bet<br><b id="bestBet">-</b></div>
<div class="box">Kelly Stake<br><b id="kelly">-</b></div>
</div>

<table class="table">
<thead>
<tr>
<th>Game</th>
<th>Market</th>
<th>Odds</th>
<th>True %</th>
<th>EV%</th>
<th>Stake</th>
<th>Grade</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
const API_KEY = "PASTE_YOUR_API_KEY";
const SPORT = "soccer_epl";

function grade(ev){
  if(ev >= 7) return {label:"A+", class:"Aplus"};
  if(ev >= 4) return {label:"A", class:"A"};
  if(ev >= 2) return {label:"B", class:"B"};
  return null;
}

// REMOVE BOOKMAKER MARGIN
function fairProb(outcomes){
  const probs = outcomes.map(o => 1/o.price);
  const total = probs.reduce((a,b)=>a+b,0);
  return probs.map(p => p/total);
}

// KELLY FORMULA
function kelly(odds, prob){
  const b = odds - 1;
  return ((b * prob) - (1 - prob)) / b;
}

function process(data){
  let results = [];

  data.forEach(game=>{
    const name = `${game.home_team} vs ${game.away_team}`;

    game.bookmakers?.forEach(book=>{
      book.markets?.forEach(m=>{
        if(!["spreads","totals"].includes(m.key)) return;

        const fair = fairProb(m.outcomes);

        m.outcomes.forEach((o,i)=>{
          const odds = o.price;
          const trueProb = fair[i];
          const ev = ((odds * trueProb) - 1) * 100;

          const g = grade(ev);
          if(!g) return;

          const k = Math.max(0, kelly(odds, trueProb));

          results.push({
            name,
            market:`${m.key} ${o.name}`,
            odds,
            trueProb,
            ev,
            kelly:k,
            grade:g
          });
        });
      });
    });
  });

  return results.sort((a,b)=>b.ev-a.ev).slice(0,20);
}

async function render(){
  document.getElementById("body").innerHTML = "Scanning...";

  const res = await fetch(`https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?markets=spreads,totals&oddsFormat=decimal&apiKey=${API_KEY}`);
  const raw = await res.json();

  const data = process(raw);

  if(!data.length){
    document.getElementById("body").innerHTML = "<tr><td colspan='7'>No edges</td></tr>";
    return;
  }

  let total=0;

  document.getElementById("body").innerHTML = data.map((d,i)=>{
    total += d.ev;

    return `
    <tr class="${i===0?'top':''}">
      <td>${d.name}</td>
      <td>${d.market}</td>
      <td>${d.odds.toFixed(2)}</td>
      <td>${(d.trueProb*100).toFixed(1)}%</td>
      <td>${d.ev.toFixed(2)}%</td>
      <td>${(d.kelly*100).toFixed(1)}%</td>
      <td><span class="badge ${d.grade.class}">${d.grade.label}</span></td>
    </tr>
    `;
  }).join("");

  document.getElementById("topEdge").textContent = data[0].ev.toFixed(2)+"%";
  document.getElementById("opps").textContent = data.length;
  document.getElementById("avgEV").textContent = (total/data.length).toFixed(2)+"%";
  document.getElementById("bestBet").textContent = data[0].market;
  document.getElementById("kelly").textContent = (data[0].kelly*100).toFixed(1)+"%";
}
</script>

</body>
</html>
