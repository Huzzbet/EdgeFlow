<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeFlow — Live Betting Edge Scanner</title>

<style>
:root{
  --bg:#020617;
  --card:#0b1220;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;
  --accent:#38bdf8;
  --shadow:0 25px 60px rgba(0,0,0,0.6);
  --radius:18px;
  font-family: system-ui,-apple-system,Segoe UI,Roboto;
}

body{
  margin:0;
  background:linear-gradient(180deg,#020617,#020617 40%,#0b1220);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:28px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.title{
  font-size:30px;
  font-weight:700;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
}

.refresh{
  font-size:13px;
  color:var(--accent);
}

.controls{
  margin-bottom:20px;
}

button{
  padding:10px 16px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:#020617;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.85;
}

.metric{
  display:flex;
  gap:16px;
  margin-bottom:22px;
}

.metric-box{
  flex:1;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
}

.metric-title{
  font-size:12px;
  color:var(--muted);
}

.metric-value{
  font-size:22px;
  font-weight:700;
  margin-top:6px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  padding:14px;
  text-align:left;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}

.table td{
  padding:14px;
  border-bottom:1px solid var(--border);
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.green{background:rgba(34,197,94,0.15); color:var(--green);}
.yellow{background:rgba(234,179,8,0.15); color:var(--yellow);}
.red{background:rgba(239,68,68,0.15); color:var(--red);}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>
      <div class="title">EdgeFlow</div>
      <div class="subtitle">Live Betting Edge Scanner</div>
    </div>
    <div class="refresh" id="refreshTime">Idle</div>
  </div>

  <!-- 🔥 SCAN BUTTON -->
  <div class="controls">
    <button onclick="render()">🔍 Scan Now</button>
  </div>

  <div class="metric">
    <div class="metric-box">
      <div class="metric-title">Top Edge</div>
      <div class="metric-value" id="topEdge">-</div>
    </div>
    <div class="metric-box">
      <div class="metric-title">Opportunities</div>
      <div class="metric-value" id="opps">-</div>
    </div>
    <div class="metric-box">
      <div class="metric-title">Avg EV</div>
      <div class="metric-value" id="avgEV">-</div>
    </div>
  </div>

  <div class="card">
    <table class="table">
      <thead>
        <tr>
          <th>Game</th>
          <th>Market</th>
          <th>Odds</th>
          <th>Fair Odds</th>
          <th>EV %</th>
          <th>Grade</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

const API_KEY = "PASTE_YOUR_REAL_API_KEY";
const SPORT = "soccer_epl"; // safer for testing

async function fetchOdds(){
  const url = `https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?regions=us,uk,eu,au&markets=h2h,totals&oddsFormat=decimal&apiKey=${API_KEY}`;

  try{
    const res = await fetch(url);
    const data = await res.json();
    console.log("API DATA:", data);
    return data;
  }catch(e){
    console.error(e);
    return [];
  }
}

function processData(data){
  let results = [];

  data.forEach(game => {
    const gameName = `${game.home_team} vs ${game.away_team}`;

    game.bookmakers?.forEach(book => {
      book.markets?.forEach(market => {

        market.outcomes?.forEach(outcome => {

          const odds = outcome.price;
          if(!odds) return;

          const fairOdds = odds * 0.97;
          const ev = ((1/fairOdds * odds) - 1) * 100;

          results.push({
            game: gameName,
            market: `${market.key} - ${outcome.name}`,
            odds,
            fair: fairOdds,
            ev
          });

        });

      });
    });

  });

  return results.sort((a,b)=>b.ev-a.ev).slice(0,20);
}

function grade(ev){
  if(ev > 6) return {label:"A", class:"green"};
  if(ev > 3) return {label:"B", class:"yellow"};
  return {label:"C", class:"red"};
}

async function render(){

  document.getElementById("refreshTime").innerText = "Scanning...";

  const raw = await fetchOdds();
  const data = processData(raw);

  if(!data.length){
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="6">No data available</td></tr>`;
    return;
  }

  let totalEV = 0;
  let top = -999;

  const rows = data.map(d => {
    const g = grade(d.ev);
    totalEV += d.ev;
    if(d.ev > top) top = d.ev;

    return `
      <tr>
        <td>${d.game}</td>
        <td>${d.market}</td>
        <td>${d.odds}</td>
        <td>${d.fair.toFixed(2)}</td>
        <td>${d.ev.toFixed(2)}%</td>
        <td><span class="badge ${g.class}">${g.label}</span></td>
      </tr>
    `;
  }).join("");

  document.getElementById("tableBody").innerHTML = rows;

  document.getElementById("topEdge").innerText = top.toFixed(2)+"%";
  document.getElementById("opps").innerText = data.length;
  document.getElementById("avgEV").innerText = (totalEV/data.length).toFixed(2)+"%";

  document.getElementById("refreshTime").innerText =
    "Updated: " + new Date().toLocaleTimeString();
}

// run once
render();

</script>

</body>
</html>
